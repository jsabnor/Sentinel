# =============================================================================
# Sentinel - AI OS Agent Configuration
# Generated by install.py
# =============================================================================

llm:
  provider: deepseek
  model: deepseek-v4-flash
  temperature: 0.2
  max_tokens: 1024             # Max response tokens (lower = less cost, 512-4096)
  api_key: ${DEEPSEEK_API_KEY}
  base_url: null

  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      model: claude-sonnet-4-20250514
    ollama:
      base_url: http://localhost:11434
      model: llama3
    groq:
      api_key: ${GROQ_API_KEY}
      model: llama-3.3-70b-versatile
    deepseek:
      api_key: ${DEEPSEEK_API_KEY}
      model: deepseek-v4-flash
    google:
      api_key: ${GOOGLE_API_KEY}
      model: gemini-2.5-flash
    openrouter:
      api_key: ${OPENROUTER_API_KEY}
      model: openai/gpt-4o
    minimax:
      api_key: ${MINIMAX_API_KEY}
      model: abab7-chat
    opencode:
      api_key: ${OPENCODE_API_KEY}
      base_url: https://api.opencode.ai/v1

voice:
  enabled: true

  # User profile: child, standard, expert
  profile: standard

  # Audio devices (index or name). List with: python main.py --list-audio
  input_device: null
  output_device: null

  stt:
    engine: whisper
    language: es
    model: small
    sample_rate: 16000
    energy_threshold: 800
    pause_threshold: 1.5

  tts:
    engine: piper
    rate: 180
    voice: default
    volume: 0.9
    piper:
      model_path: "C:/Users/josem/Sentinel/models/piper/es_ES-carlfm-x_low/es_ES-carlfm-x_low.onnx"
      config_path: null

  activation: pushtotalk
  wakeword_model: tiny
  wake_words:
    - centinela
    - sentinel
  push_to_talk_key: f9
  quit_key: ctrl+alt+q
  conversation_timeout: 0       # 0 = disabled, auto-listen after response wastes tokens
  max_history: 4                 # Max conversation messages to keep (2-12, lower = less tokens)
  max_tool_calls: 6              # Max tool calls per request (3-8, lower = less tokens)

safety:
  default_mode: auto

  permissions:
    terminal:
      mode: auto
      blocked_commands:
        - rm -rf /
        - del /f /s C:\*
        - format
        - diskpart
    desktop:
      mode: auto
    files:
      mode: auto
      blocked_paths:
        - C:\Windows
        - C:\Windows\System32
        - /etc
        - /boot
    processes:
      mode: auto
      blocked_processes:
        - System
        - svchost
    windows:
      mode: auto

  high_risk_patterns:
    - delete
    - remove
    - shutdown
    - kill

sandbox:
  enabled: false
  allowed_paths: []
  allowed_commands: []
  max_command_timeout: 60

desktop:
  screenshot_quality: 80
  mouse_speed: 0.3
  pause_between_actions: 0.1

logging:
  level: INFO
  file: sentinel.log
  max_size_mb: 10
  backup_count: 3
